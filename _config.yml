title: Bob Running
description: Singer Songwriter

collections:
  - releases
  - videos
  - reels
  - events

defaults:
  - scope:
      path: "releases"
      type: "releases"
    values:
      layout: "release"
  - scope:
      path: "reels"
      type: "reels"
    values:
      layout: "reel"
  - scope:
      path: "videos"
      type: "videos"
    values:
      layout: "video"

root: /

baseurl: /
url: https://rjrunning.github.io